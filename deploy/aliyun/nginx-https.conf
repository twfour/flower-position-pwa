server {
    listen 80;
    server_name flower.qinyibin.com;

    location ^~ /.well-known/acme-challenge/ {
        root /opt/flower-position-pwa;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 308 https://$host$request_uri;
    }
}

server {
    listen 80;
    server_name qinyibin.com www.qinyibin.com;

    location ^~ /.well-known/acme-challenge/ {
        root /opt/flower-position-pwa;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 308 https://flower.qinyibin.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name qinyibin.com www.qinyibin.com;

    ssl_certificate /etc/nginx/ssl/qinyibin.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/qinyibin.com/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    location / {
        return 308 https://flower.qinyibin.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name flower.qinyibin.com;

    ssl_certificate /etc/nginx/ssl/flower.qinyibin.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/flower.qinyibin.com/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    client_max_body_size 16m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
