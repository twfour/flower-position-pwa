<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f4f0e6">
    <meta name="description" content="识花定位 PWA：拍照识别花卉，记录位置和观察笔记。">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="assets/icon.svg">
    <link rel="stylesheet" href="styles.css">
    <title>识花定位</title>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Flower Field PWA</p>
          <h1>识花定位</h1>
        </div>
        <button class="icon-button" id="installButton" type="button" hidden aria-label="安装应用" title="安装应用">
          <span aria-hidden="true">↓</span>
        </button>
      </header>

      <main>
        <section class="capture-panel" aria-labelledby="captureTitle">
          <div class="leaf-mark" aria-hidden="true"></div>
          <div class="capture-copy">
            <p class="eyebrow">New Observation</p>
            <h2 id="captureTitle">拍一朵花，留下它的位置</h2>
            <p>适合野外观察、校园植物记录、亲子自然笔记。照片和定位默认保存在本机。</p>
          </div>

          <div class="preview-frame">
            <img id="photoPreview" src="assets/specimen.svg" alt="待识别花卉预览">
          </div>

          <div class="actions">
            <label class="primary-action">
              <input id="photoInput" type="file" accept="image/*" capture="environment">
              <span>拍照或选择图片</span>
            </label>
            <button id="locateButton" class="secondary-action" type="button">获取位置</button>
          </div>

          <div class="status-grid" aria-live="polite">
            <div>
              <span>位置</span>
              <strong id="locationStatus">未获取</strong>
            </div>
            <div>
              <span>网络</span>
              <strong id="networkStatus">检测中</strong>
            </div>
          </div>
        </section>

        <section class="result-panel" aria-labelledby="resultTitle">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Recognition</p>
              <h2 id="resultTitle">识别结果</h2>
            </div>
            <button id="identifyButton" class="icon-text-button" type="button">识别</button>
          </div>

          <div id="resultEmpty" class="empty-state">
            选择照片后点击识别。离线时会先保存观察，等接入云端模型后可补全结果。
          </div>

          <div id="resultCard" class="result-card" hidden>
            <div>
              <span class="confidence" id="confidenceLabel">--%</span>
              <h3 id="flowerName">未知花卉</h3>
              <p id="flowerLatin">Unknown species</p>
            </div>
            <ul id="flowerTraits"></ul>
          </div>

          <label class="notes-label" for="noteInput">观察笔记</label>
          <textarea id="noteInput" rows="4" placeholder="花色、环境、气味、枝叶形态..."></textarea>
          <button id="saveButton" class="save-button" type="button">保存观察</button>
        </section>

        <section class="history-panel" aria-labelledby="historyTitle">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">Local Log</p>
              <h2 id="historyTitle">本机记录</h2>
            </div>
            <button id="clearButton" class="ghost-button" type="button">清空</button>
          </div>
          <div id="historyList" class="history-list"></div>
        </section>
      </main>
    </div>

    <script src="app.js" type="module"></script>
  </body>
</html>
